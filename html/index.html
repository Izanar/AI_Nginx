<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kyiv Weather: 5-Day Forecast & Effects</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --accent: #38bdf8;
        }
        body {
            margin: 0; padding: 0;
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: #f8fafc;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; overflow-x: hidden;
            transition: background 1s ease;
        }

        /* Fullscreen Effects Layer */
        #effects-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; z-index: 1;
        }

        .container {
            position: relative; z-index: 10;
            text-align: center; width: 90%; max-width: 900px;
            padding: 40px;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border-radius: 2.5rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 3rem; margin: 0;
            background: linear-gradient(90deg, #38bdf8, #818cf8, #38bdf8);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
        }
        @keyframes shine { to { background-position: 200% center; } }

        /* Current Weather */
        #current-temp { font-size: 4rem; font-weight: 800; margin: 10px 0; color: #fff; }
        #current-status { font-size: 1.5rem; color: var(--accent); margin-bottom: 30px; text-transform: uppercase; letter-spacing: 2px; }

        /* Forecast Grid */
        .forecast-grid {
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; margin-top: 30px;
            padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1);
        }
        .forecast-day {
            background: rgba(255,255,255,0.05); padding: 15px; border-radius: 1.5rem;
            transition: transform 0.3s;
        }
        .forecast-day:hover { transform: translateY(-5px); background: rgba(255,255,255,0.1); }
        .day-name { font-size: 0.9rem; opacity: 0.7; margin-bottom: 8px; }
        .day-temp { font-weight: bold; font-size: 1.2rem; }

        /* Weather Animations */
        .rain-drop {
            position: absolute; background: linear-gradient(to bottom, transparent, #fff);
            width: 2px; height: 40px; top: -50px; opacity: 0.4;
            animation: rain-fall linear infinite;
        }
        @keyframes rain-fall { to { transform: translateY(110vh); } }

        .snow-flake {
            position: absolute; background: white; border-radius: 50%;
            top: -10px; opacity: 0.8; animation: snow-fall linear infinite;
        }
        @keyframes snow-fall { 
            0% { transform: translate(0, 0); }
            50% { transform: translate(20px, 50vh); }
            100% { transform: translate(-20px, 110vh); }
        }

        .cloud {
            position: absolute; background: rgba(255,255,255,0.1);
            filter: blur(40px); border-radius: 50%;
            animation: drift linear infinite;
        }
        @keyframes drift { from { left: -200px; } to { left: 100vw; } }

        .sun-aura {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(255,200,0,0.15) 0%, transparent 60%);
            animation: glow 4s infinite alternate;
        }
        @keyframes glow { from { opacity: 0.4; transform: scale(1); } to { opacity: 0.8; transform: scale(1.1); } }
    </style>
</head>
<body>
    <div id="effects-bg"></div>

    <div class="container">
        <h1>KYIV SKYLINE</h1>
        <div id="current-temp">--°C</div>
        <div id="current-status">Detecting Atmosphere...</div>
        
        <div class="forecast-grid" id="forecast">
            <!-- 5 days will be injected here -->
        </div>
        
        <p style="margin-top: 40px; opacity: 0.5; font-size: 0.8rem;">Powered by Open-Meteo API • Local Time: <span id="local-time">--:--</span></p>
    </div>

    <script>
        const WEATHER_MAP = {
            0: "Clear", 1: "Mainly Clear", 2: "Partly Cloudy", 3: "Overcast",
            45: "Foggy", 48: "Foggy",
            51: "Drizzle", 53: "Drizzle", 55: "Drizzle",
            61: "Rainy", 63: "Rainy", 65: "Rainy",
            71: "Snowy", 73: "Snowy", 75: "Snowy",
            80: "Showers", 81: "Showers", 82: "Showers",
            95: "Stormy"
        };

        async function init() {
            try {
                const response = await fetch('https://api.open-meteo.com/v1/forecast?latitude=50.4501&longitude=30.5234&current=temperature_2m,weather_code&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=auto');
                const data = await response.json();
                
                // Set Current
                const temp = Math.round(data.current.temperature_2m);
                const code = data.current.weather_code;
                const status = WEATHER_MAP[code] || "Clear";
                
                document.getElementById('current-temp').innerText = `${temp}°C`;
                document.getElementById('current-status').innerText = status;
                
                // Set Forecast (Next 5 Days)
                const forecastContainer = document.getElementById('forecast');
                forecastContainer.innerHTML = '';
                
                for (let i = 1; i <= 5; i++) {
                    const date = new Date(data.daily.time[i]);
                    const dayName = date.toLocaleDateString('en-US', { weekday: 'short' });
                    const maxTemp = Math.round(data.daily.temperature_2m_max[i]);
                    const dCode = data.daily.weather_code[i];
                    
                    forecastContainer.innerHTML += `
                        <div class="forecast-day">
                            <div class="day-name">${dayName}</div>
                            <div style="font-size: 1.5rem; margin: 5px 0;">${getIcon(dCode)}</div>
                            <div class="day-temp">${maxTemp}°</div>
                        </div>
                    `;
                }

                applyVisuals(status);
            } catch (e) {
                console.error("Weather failed:", e);
                document.getElementById('current-status').innerText = "Offline Mode";
            }
            
            // Clock
            setInterval(() => {
                document.getElementById('local-time').innerText = new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
            }, 1000);
        }

        function getIcon(code) {
            if (code >= 71 && code <= 77) return "❄️";
            if (code >= 51 && code <= 67 || code >= 80) return "🌧️";
            if (code >= 1 && code <= 3) return "☁️";
            if (code >= 95) return "⚡";
            return "☀️";
        }

        function applyVisuals(status) {
            const bg = document.getElementById('effects-bg');
            bg.innerHTML = '';

            if (status.includes("Rainy") || status.includes("Showers") || status.includes("Drizzle")) {
                document.body.style.background = "#1e293b";
                for(let i=0; i<150; i++) {
                    const drop = document.createElement('div');
                    drop.className = 'rain-drop';
                    drop.style.left = Math.random() * 100 + 'vw';
                    drop.style.animationDuration = (Math.random() * 0.4 + 0.3) + 's';
                    drop.style.animationDelay = Math.random() * 2 + 's';
                    bg.appendChild(drop);
                }
            } else if (status.includes("Snowy")) {
                document.body.style.background = "#334155";
                for(let i=0; i<80; i++) {
                    const flake = document.createElement('div');
                    flake.className = 'snow-flake';
                    flake.style.width = flake.style.height = Math.random() * 6 + 4 + 'px';
                    flake.style.left = Math.random() * 100 + 'vw';
                    flake.style.animationDuration = (Math.random() * 4 + 3) + 's';
                    flake.style.opacity = Math.random();
                    bg.appendChild(flake);
                }
            } else if (status.includes("Cloudy") || status === "Overcast") {
                document.body.style.background = "#1e293b";
                for(let i=0; i<5; i++) {
                    const cloud = document.createElement('div');
                    cloud.className = 'cloud';
                    cloud.style.width = (Math.random() * 300 + 200) + 'px';
                    cloud.style.height = (Math.random() * 150 + 100) + 'px';
                    cloud.style.top = Math.random() * 80 + 'vh';
                    cloud.style.animationDuration = (Math.random() * 20 + 20) + 's';
                    bg.appendChild(cloud);
                }
            } else {
                // Clear / Sunny
                document.body.style.background = "#0f172a";
                const sun = document.createElement('div');
                sun.className = 'sun-aura';
                bg.appendChild(sun);
            }
        }

        init();
    </script>
</body>
</html>
