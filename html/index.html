<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI & Human Collaboration</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            text-align: center;
            max-width: 1000px;
            padding: 20px;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 1.5rem;
            background: linear-gradient(90deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .image-wrapper {
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
            border-radius: 1rem;
            overflow: hidden;
            border: 1px solid #1e293b;
        }
        img {
            display: block;
            width: 100%;
            height: auto;
            max-height: 70vh;
            object-fit: cover;
        }
        p {
            margin-top: 1.5rem;
            color: #94a3b8;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Future of Synergy: AI & Human</h1>
        <div class="image-wrapper">
            <img src="images/ai-human.jpg" alt="AI and Human Collaboration">
        </div>
        <p>This image is now served from a Docker Volume managed by Nginx.</p>
    </div>
</body>
</html>
