<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kyiv Weather & AI Synergy</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            transition: background 1s ease;
        }

        /* Weather Effects Containers */
        #effects {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            max-width: 800px;
            padding: 20px;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(90deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #weather-info {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            color: #38bdf8;
        }

        .image-wrapper {
            border-radius: 1rem;
            overflow: hidden;
            border: 1px solid #1e293b;
            margin-bottom: 1rem;
        }

        img {
            display: block;
            width: 100%;
            height: auto;
            max-height: 50vh;
            object-fit: cover;
        }

        /* Animations */
        .drop {
            position: absolute;
            background: rgba(255,255,255,0.3);
            width: 2px;
            height: 20px;
            top: -20px;
            animation: fall linear infinite;
        }

        .snowflake {
            position: absolute;
            background: white;
            border-radius: 50%;
            top: -10px;
            animation: fall linear infinite;
        }

        @keyframes fall {
            to { transform: translateY(105vh); }
        }

        .sun-ray {
            position: absolute;
            top: 50%; left: 50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,0,0.1) 0%, transparent 70%);
            transform: translate(-50%, -50%);
            animation: pulse 4s infinite alternate;
        }

        @keyframes pulse {
            from { opacity: 0.3; } to { opacity: 0.7; }
        }
    </style>
</head>
<body>
    <div id="effects"></div>

    <div class="container">
        <h1>Synergy in Kyiv</h1>
        <div id="weather-info">Loading weather...</div>
        
        <div class="image-wrapper">
            <img src="images/ai-human.jpg" alt="AI and Human Collaboration">
        </div>
        
        <p>Dynamic weather effects based on real-time Kyiv forecast.</p>
    </div>

    <script>
        async function updateWeather() {
            try {
                // Kyiv Coordinates: 50.45, 30.52
                const response = await fetch('https://api.open-meteo.com/v1/forecast?latitude=50.4501&longitude=30.5234&current=temperature_2m,weather_code');
                const data = await response.json();
                
                const temp = Math.round(data.current.temperature_2m);
                const code = data.current.weather_code;
                
                let status = "Clear";
                if (code > 0 && code < 4) status = "Cloudy";
                if (code >= 51 && code <= 67) status = "Rainy";
                if (code >= 71 && code <= 77) status = "Snowy";
                if (code >= 80) status = "Stormy";

                document.getElementById('weather-info').innerText = `Kyiv: ${temp}°C | ${status}`;
                applyEffects(status);
            } catch (e) {
                document.getElementById('weather-info').innerText = "Kyiv: 15°C | AI Synergy";
                applyEffects("Clear");
            }
        }

        function applyEffects(status) {
            const container = document.getElementById('effects');
            container.innerHTML = '';
            
            if (status === "Rainy" || status === "Stormy") {
                document.body.style.background = "#1e293b";
                for(let i=0; i<100; i++) {
                    let drop = document.createElement('div');
                    drop.className = 'drop';
                    drop.style.left = Math.random() * 100 + '%';
                    drop.style.animationDuration = (Math.random() * 0.5 + 0.5) + 's';
                    drop.style.animationDelay = Math.random() * 2 + 's';
                    container.appendChild(drop);
                }
            } else if (status === "Snowy") {
                document.body.style.background = "#334155";
                for(let i=0; i<50; i++) {
                    let flake = document.createElement('div');
                    flake.className = 'snowflake';
                    flake.style.width = flake.style.height = Math.random() * 5 + 2 + 'px';
                    flake.style.left = Math.random() * 100 + '%';
                    flake.style.animationDuration = (Math.random() * 3 + 2) + 's';
                    flake.style.opacity = Math.random();
                    container.appendChild(flake);
                }
            } else if (status === "Clear") {
                document.body.style.background = "#0f172a";
                let sun = document.createElement('div');
                sun.className = 'sun-ray';
                container.appendChild(sun);
            }
        }

        updateWeather();
        setInterval(updateWeather, 600000); // Update every 10 mins
    </script>
</body>
</html>
