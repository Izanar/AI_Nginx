<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kyiv Skyline: Vanguard Edition</title>
    <style>
        :root { --bg: #050811; --acc: #38bdf8; --red: #ef4444; --green: #22c55e; }
        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: #f8fafc; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; transition: background 1s ease; }
        #effects-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 1; }
        .container { position: relative; z-index: 10; text-align: center; width: 90%; max-width: 900px; padding: 40px; background: rgba(15,23,42,0.7); backdrop-filter: blur(20px); border-radius: 3rem; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.8); transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .header-title { font-size: 3rem; font-weight: 900; margin: 0; display: flex; justify-content: center; gap: 15px; }
        .header-title span { cursor: pointer; transition: 0.3s; background: linear-gradient(90deg, var(--acc), #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header-title span:hover { transform: scale(1.1); filter: brightness(1.5); }
        #current-temp { font-size: 5rem; font-weight: 800; margin: 10px 0; cursor: pointer; text-shadow: 0 0 20px rgba(56,189,248,0.2); }
        #audio-btn { position: fixed; top: 25px; right: 25px; z-index: 100; background: var(--acc); color: #000; border: none; padding: 12px 24px; border-radius: 50px; font-weight: 900; cursor: pointer; box-shadow: 0 0 20px rgba(56,189,248,0.4); transition: 0.3s; }
        #audio-btn:hover { transform: scale(1.05); filter: brightness(1.1); }
        .forecast-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; margin-top: 25px; }
        .day-card { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 1.5rem; cursor: pointer; transition: 0.3s; border: 1px solid transparent; }
        .day-card:hover { background: rgba(255,255,255,0.08); border-color: var(--acc); transform: translateY(-5px); }
        .icon { font-size: 1.8rem; margin: 8px 0; }
        /* Volumetric Meteor */
        .meteor { position: absolute; width: 3px; height: 80px; background: linear-gradient(to bottom, rgba(255,150,0,0), #fff); border-radius: 999px; filter: drop-shadow(0 0 10px #ff6b00); animation: m-fall 0.8s linear infinite; }
        .meteor::before { content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); width: 8px; height: 8px; background: #fff; border-radius: 50%; box-shadow: 0 0 20px 5px #ffaa00; }
        @keyframes m-fall { from { transform: translate(100vw, -100px) rotate(-45deg); } to { transform: translate(-100px, 100vh) rotate(-45deg); } }
        /* Blood Fog */
        .blood-fog { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, rgba(239,68,68,0.2) 0%, rgba(127,29,29,0.6) 100%); opacity: 0; transition: 2s; z-index: 5; pointer-events: none; }
        /* AI Matrix */
        .matrix-col { position: absolute; top: -100px; color: var(--green); font-family: monospace; font-size: 1.2rem; animation: fall linear infinite; text-shadow: 0 0 8px var(--green); white-space: nowrap; writing-mode: vertical-rl; }
        .scanner { position: fixed; top: 0; left: 0; width: 100%; height: 5px; background: var(--green); box-shadow: 0 0 30px var(--green); z-index: 20; animation: scan 4s linear infinite; display: none; }
        @keyframes scan { from { top: -5%; } to { top: 105%; } }
        @keyframes fall { to { transform: translateY(110vh); } }
        .glitch-active { animation: glitch-fx 0.3s infinite; }
        @keyframes glitch-fx { 0% { transform: translate(0); text-shadow: 2px 2px #f0f; } 50% { transform: translate(-3px, 3px); text-shadow: -2px -2px #0ff; } 100% { transform: translate(0); } }
        .shake-active { animation: shake-fx 0.5s infinite; }
        @keyframes shake-fx { 0%, 100% { transform: translate(0,0); } 25% { transform: translate(10px, -10px); } 50% { transform: translate(-10px, 10px); } }
        /* Normal Weather */
        .rain { position: absolute; background: #fff; width: 1px; height: 30px; opacity: 0.2; animation: fall linear infinite; }
        .snow { position: absolute; background: #fff; border-radius: 50%; opacity: 0.8; animation: fall linear infinite; }
        .cloud { position: absolute; background: rgba(255,255,255,0.05); filter: blur(50px); border-radius: 50%; animation: drift linear infinite; }
        @keyframes drift { from { left: -500px; } to { left: 105vw; } }
    </style>
</head>
<body>
    <button id="audio-btn" onclick="initAudio()">🔇 ENABLE SOUND</button>
    <div id="effects-bg"></div>
    <div id="scanner" class="scanner"></div>
    <div id="blood-fog" class="blood-fog"></div>
    <div id="lightning" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#fff;opacity:0;z-index:2;pointer-events:none;"></div>

    <div class="container" id="main-cont">
        <h1 class="header-title" id="title-fx">
            <span onclick="triggerSpace()">KYIV</span>
            <span onclick="triggerZom()">SYNERGY</span>
        </h1>
        <div id="current-temp" onclick="triggerAI()">--°C</div>
        <div id="status-label" style="text-transform:uppercase; letter-spacing:3px; color:var(--acc); font-weight:bold;">Initializing System...</div>
        <div class="forecast-grid" id="real-grid"></div>
        <div class="forecast-grid" id="demo-grid" style="border-top:1px solid rgba(255,255,255,0.1); margin-top:30px; padding-top:15px;"></div>
    </div>

    <script>
        let audioCtx = null;
        let sounds = {};
        const MAP = { 0:"Clear", 3:"Cloudy", 63:"Rainy", 71:"Snowy", 95:"Stormy" };
        const ICONS = { 0:"☀️", 3:"☁️", 63:"🌧️", 71:"❄️", 95:"⚡" };

        async function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const sources = {
                rain: 'https://www.soundjay.com/nature/sounds/rain-07.mp3',
                wind: 'https://www.soundjay.com/nature/sounds/wind-01.mp3',
                thunder: 'https://www.soundjay.com/nature/sounds/thunder-05.mp3',
                zombie: 'https://actions.google.com/sounds/v1/horror/zombie_growl.ogg',
                meteor: 'https://www.soundjay.com/mechanical/sounds/fire-whoosh-01.mp3',
                ai: 'https://www.soundjay.com/buttons/sounds/button-20.mp3'
            };
            for (const [k, url] of Object.entries(sources)) {
                const a = new Audio(url); a.crossOrigin = "anonymous"; a.loop = (k!=='meteor'); sounds[k] = a;
            }
            document.getElementById('audio-btn').innerText = "🔊 SOUND ON";
            applyVisuals(document.getElementById('status-label').innerText);
        }

        function stopS() { Object.values(sounds).forEach(s => { s.pause(); s.currentTime = 0; }); }
        function playS(k) { if(audioCtx && sounds[k]) sounds[k].play().catch(() => {}); }

        async function start() {
            try {
                const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=50.45&longitude=30.52&current=temperature_2m,weather_code&daily=weather_code,temperature_2m_max');
                const data = await res.json();
                upd(Math.round(data.current.temperature_2m), MAP[data.current.weather_code]||"Clear");
                const rg = document.getElementById('real-grid');
                for(let i=1;i<=5;i++) createCard(rg, new Date(data.daily.time[i]).toLocaleDateString('en',{weekday:'short'}), Math.round(data.daily.temperature_2m_max[i]), data.daily.weather_code[i]);
                const dg = document.getElementById('demo-grid');
                Object.entries(MAP).forEach(([c,s]) => createCard(dg, "Demo", 25, c, s));
                applyVisuals(MAP[data.current.weather_code]||"Clear");
            } catch(e) { document.getElementById('status-label').innerText = "Offline Mode"; }
        }

        function createCard(p, n, t, c, fs=null) {
            const s = fs || MAP[c] || "Clear";
            const el = document.createElement('div'); el.className = 'day-card';
            el.innerHTML = `<div>${n}</div><div class="icon">${ICONS[c]||"☀️"}</div><div>${t}°</div>`;
            el.onclick = () => { upd(t,s); applyVisuals(s); };
            p.appendChild(el);
        }
        function upd(t,s) { document.getElementById('current-temp').innerText = `${t}°C`; document.getElementById('status-label').innerText = s; }

        function applyVisuals(s) {
            stopS(); const bg = document.getElementById('effects-bg');
            bg.innerHTML = ''; document.getElementById('scanner').style.display = 'none';
            document.getElementById('blood-fog').style.opacity = '0';
            document.getElementById('main-cont').classList.remove('shake-active');
            document.getElementById('title-fx').classList.remove('glitch-active');
            document.body.style.background = varProp('--bg');
            if(s.includes("Rainy")) { playS('rain'); for(let i=0;i<120;i++) spawn(bg, 'rain'); }
            else if(s.includes("Snowy")) { playS('wind'); for(let i=0;i<80;i++) spawn(bg, 'snow'); }
            else if(s.includes("Cloudy")) { playS('wind'); for(let i=0;i<10;i++) spawn(bg, 'cloud'); }
            else if(s === "Stormy") { playS('thunder'); playS('rain'); document.getElementById('lightning').style.animation = 'flash 5s infinite'; for(let i=0;i<150;i++) spawn(bg, 'rain'); }
        }

        function varProp(name) { return getComputedStyle(document.documentElement).getPropertyValue(name); }

        function spawn(p, c, txt=null) {
            const el = document.createElement('div'); el.className = c;
            el.style.left = Math.random()*100+'vw';
            if(c==='snow') { el.style.width=el.style.height=Math.random()*6+4+'px'; el.style.animationDuration=Math.random()*4+3+'s'; }
            else if(c==='cloud') { el.style.top=Math.random()*70+'vh'; el.style.width='400px'; el.style.height='200px'; el.style.animationDuration='25s'; }
            else if(c==='matrix-col') { el.innerText = txt; el.style.animationDuration = Math.random()*2+1+'s'; }
            else { el.style.animationDuration=Math.random()*0.5+0.5+'s'; }
            p.appendChild(el);
        }

        window.triggerSpace = () => { applyVisuals('None'); playS('meteor'); document.body.style.background="#000"; document.getElementById('status-label').innerText="METEOR SHOWER"; for(let i=0;i<40;i++) spawn(document.getElementById('effects-bg'), 'meteor'); };
        window.triggerZom = () => { applyVisuals('None'); playS('zombie'); document.getElementById('blood-fog').style.opacity='1'; document.getElementById('main-cont').classList.add('shake-active'); document.getElementById('status-label').innerText="ZOMBIE APOCALYPSE"; };
        window.triggerAI = () => { applyVisuals('None'); playS('ai'); document.body.style.background="#000"; document.getElementById('status-label').innerText="AI OVERRIDE"; document.getElementById('scanner').style.display='block'; document.getElementById('title-fx').classList.add('glitch-active'); const codes = ["AI_ERROR", "SYS_CRITICAL", "OVERRIDE", "1010101"]; for(let i=0;i<40;i++) spawn(document.getElementById('effects-bg'), 'matrix-col', codes[Math.floor(Math.random()*codes.length)]); };
        start();
    </script>
</body>
</html>
