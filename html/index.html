<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kyiv Skyline: Absolute Audio-Visual</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button id="audio-btn" onclick="toggleAudio()">🔇 ENABLE SOUND</button>

    <!-- Audio Engine -->
    <audio id="snd-rain" loop src="audio/rain.mp3"></audio>
    <audio id="snd-wind" loop src="audio/wind.mp3"></audio>
    <audio id="snd-thunder" loop src="audio/thunder.mp3"></audio>
    <audio id="snd-zombie" loop src="audio/zombie.mp3?v=2"></audio>
    <audio id="snd-meteor" src="audio/meteor.mp3"></audio>
    <audio id="snd-ai" loop src="audio/ai.mp3"></audio>
    <audio id="snd-sun" loop src="audio/sun.mp3"></audio>
    <audio id="snd-cloudy" loop src="audio/cloudy.mp3"></audio>
    <audio id="snd-snow" loop src="audio/snow.mp3"></audio>

    <div id="effects-bg"></div>
    <div id="lightning-bolt" class="lightning"></div>
    <div id="blood-fog" class="blood-fog"></div>
    <div id="scanner" class="scanner"></div>

    <div class="container" id="main-cont">
        <h1 class="header-title">
            <span onclick="activateSpace()">KYIV</span>
            <span onclick="activateZom()">SYNERGY</span>
        </h1>
        <div id="current-temp" onclick="activateAI()">--°C</div>
        <div id="status" style="color:var(--acc); text-transform:uppercase; letter-spacing:2px; font-weight:bold">System Active</div>
        <div class="forecast-grid" id="real-f"></div>
        <div class="forecast-grid" id="demo-f" style="border-top:1px solid rgba(255,255,255,0.1); margin-top:20px; padding-top:10px"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
