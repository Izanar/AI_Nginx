<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kyiv Weather: Interactive Forecast & Effects</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --accent: #38bdf8;
        }
        body {
            margin: 0; padding: 0;
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: #f8fafc;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; overflow-x: hidden;
            transition: background 1s ease;
        }

        #effects-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; z-index: 1;
        }

        .container {
            position: relative; z-index: 10;
            text-align: center; width: 95%; max-width: 1000px;
            padding: 40px;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border-radius: 2.5rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 2.5rem; margin: 0;
            background: linear-gradient(90deg, #38bdf8, #818cf8, #38bdf8);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
        }
        @keyframes shine { to { background-position: 200% center; } }

        #current-temp { font-size: 4rem; font-weight: 800; margin: 10px 0; color: #fff; }
        #current-status { font-size: 1.2rem; color: var(--accent); margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }

        .section-label { font-size: 0.8rem; opacity: 0.5; margin: 20px 0 10px; text-transform: uppercase; letter-spacing: 1px; }

        .forecast-grid {
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px;
            margin-bottom: 20px;
        }
        .forecast-day {
            background: rgba(255,255,255,0.05); padding: 12px; border-radius: 1.2rem;
            cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid transparent;
        }
        .forecast-day:hover { transform: translateY(-5px); background: rgba(255,255,255,0.15); border-color: rgba(56, 189, 248, 0.4); }
        .forecast-day.active { background: rgba(56, 189, 248, 0.2); border-color: var(--accent); box-shadow: 0 0 15px rgba(56, 189, 248, 0.3); }
        
        .day-name { font-size: 0.8rem; opacity: 0.7; margin-bottom: 5px; }
        .day-temp { font-weight: bold; font-size: 1.1rem; }

        /* Weather Animations */
        .rain-drop {
            position: absolute; background: linear-gradient(to bottom, transparent, #fff);
            width: 2px; height: 40px; top: -50px; opacity: 0.4;
            animation: rain-fall linear infinite;
        }
        @keyframes rain-fall { to { transform: translateY(110vh); } }

        .snow-flake {
            position: absolute; background: white; border-radius: 50%;
            top: -10px; opacity: 0.8; animation: snow-fall linear infinite;
        }
        @keyframes snow-fall { 
            0% { transform: translate(0, 0); }
            50% { transform: translate(20px, 50vh); }
            100% { transform: translate(-20px, 110vh); }
        }

        .cloud {
            position: absolute; background: rgba(255,255,255,0.1);
            filter: blur(40px); border-radius: 50%;
            animation: drift linear infinite;
        }
        @keyframes drift { from { left: -200px; } to { left: 100vw; } }

        .sun-aura {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(255,200,0,0.15) 0%, transparent 60%);
            animation: glow 4s infinite alternate;
        }
        @keyframes glow { from { opacity: 0.4; transform: scale(1); } to { opacity: 0.8; transform: scale(1.1); } }
        
        .lightning {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; opacity: 0; z-index: 2;
            pointer-events: none;
        }
        @keyframes flash {
            0%, 90%, 100% { opacity: 0; }
            92% { opacity: 0.3; }
            94% { opacity: 0.1; }
            96% { opacity: 0.6; }
        }
    </style>
</head>
<body>
    <div id="effects-bg"></div>
    <div id="lightning-bolt" class="lightning"></div>

    <div class="container">
        <h1>KYIV SYNERGY</h1>
        <div id="current-temp">--°C</div>
        <div id="current-status">Detecting Atmosphere...</div>
        
        <div class="section-label">Real 5-Day Forecast</div>
        <div class="forecast-grid" id="real-forecast"></div>
        
        <div class="section-label">Demo: Interactive Effects Test</div>
        <div class="forecast-grid" id="demo-forecast"></div>
        
        <p style="margin-top: 30px; opacity: 0.4; font-size: 0.7rem;">Click any day to change current weather effects • Local Time: <span id="local-time">--:--</span></p>
    </div>

    <script>
        const WEATHER_MAP = {
            0: "Clear", 1: "Mainly Clear", 2: "Partly Cloudy", 3: "Overcast",
            45: "Foggy", 48: "Foggy",
            51: "Drizzle", 53: "Drizzle", 55: "Drizzle",
            61: "Rainy", 63: "Rainy", 65: "Rainy",
            71: "Snowy", 73: "Snowy", 75: "Snowy",
            80: "Showers", 81: "Showers", 82: "Showers",
            95: "Stormy"
        };

        const DEMO_DAYS = [
            { name: "Demo", status: "Clear", temp: 25, code: 0, icon: "☀️" },
            { name: "Demo", status: "Cloudy", temp: 18, code: 3, icon: "☁️" },
            { name: "Demo", status: "Rainy", temp: 12, code: 63, icon: "🌧️" },
            { name: "Demo", status: "Snowy", temp: -2, code: 73, icon: "❄️" },
            { name: "Demo", status: "Stormy", temp: 15, code: 95, icon: "⚡" }
        ];

        async function init() {
            try {
                const response = await fetch('https://api.open-meteo.com/v1/forecast?latitude=50.4501&longitude=30.5234&current=temperature_2m,weather_code&daily=weather_code,temperature_2m_max&timezone=auto');
                const data = await response.json();
                
                // Set Current Initial
                updateDisplay(Math.round(data.current.temperature_2m), WEATHER_MAP[data.current.weather_code] || "Clear");
                
                // Render Real Forecast
                const realContainer = document.getElementById('real-forecast');
                for (let i = 1; i <= 5; i++) {
                    const date = new Date(data.daily.time[i]);
                    const dayName = date.toLocaleDateString('en-US', { weekday: 'short' });
                    const code = data.daily.weather_code[i];
                    createDayElement(realContainer, dayName, Math.round(data.daily.temperature_2m_max[i]), code);
                }

                // Render Demo Forecast
                const demoContainer = document.getElementById('demo-forecast');
                DEMO_DAYS.forEach(day => {
                    createDayElement(demoContainer, day.name, day.temp, day.code, day.status);
                });

                applyVisuals(WEATHER_MAP[data.current.weather_code] || "Clear");
            } catch (e) {
                console.error("Weather failed:", e);
                document.getElementById('current-status').innerText = "Offline Mode";
            }
            
            setInterval(() => {
                document.getElementById('local-time').innerText = new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
            }, 1000);
        }

        function createDayElement(container, name, temp, code, forcedStatus = null) {
            const status = forcedStatus || WEATHER_MAP[code] || "Clear";
            const el = document.createElement('div');
            el.className = 'forecast-day';
            el.innerHTML = `
                <div class="day-name">${name}</div>
                <div style="font-size: 1.4rem; margin: 5px 0;">${getIcon(code)}</div>
                <div class="day-temp">${temp}°</div>
            `;
            el.onclick = () => {
                document.querySelectorAll('.forecast-day').forEach(d => d.classList.remove('active'));
                el.classList.add('active');
                updateDisplay(temp, status);
                applyVisuals(status);
            };
            container.appendChild(el);
        }

        function updateDisplay(temp, status) {
            document.getElementById('current-temp').innerText = `${temp}°C`;
            document.getElementById('current-status').innerText = status;
        }

        function getIcon(code) {
            if (code >= 71 && code <= 77) return "❄️";
            if (code >= 51 && code <= 67 || code >= 80) return "🌧️";
            if (code >= 1 && code <= 3) return "☁️";
            if (code >= 95) return "⚡";
            return "☀️";
        }

        function applyVisuals(status) {
            const bg = document.getElementById('effects-bg');
            const lightning = document.getElementById('lightning-bolt');
            bg.innerHTML = '';
            lightning.style.animation = 'none';

            if (status.includes("Rainy") || status.includes("Showers") || status.includes("Drizzle")) {
                document.body.style.background = "#1e293b";
                for(let i=0; i<150; i++) {
                    const drop = document.createElement('div');
                    drop.className = 'rain-drop';
                    drop.style.left = Math.random() * 100 + 'vw';
                    drop.style.animationDuration = (Math.random() * 0.4 + 0.3) + 's';
                    drop.style.animationDelay = Math.random() * 2 + 's';
                    bg.appendChild(drop);
                }
            } else if (status.includes("Snowy")) {
                document.body.style.background = "#334155";
                for(let i=0; i<80; i++) {
                    const flake = document.createElement('div');
                    flake.className = 'snow-flake';
                    flake.style.width = flake.style.height = Math.random() * 6 + 4 + 'px';
                    flake.style.left = Math.random() * 100 + 'vw';
                    flake.style.animationDuration = (Math.random() * 4 + 3) + 's';
                    flake.style.opacity = Math.random();
                    bg.appendChild(flake);
                }
            } else if (status.includes("Cloudy") || status === "Overcast") {
                document.body.style.background = "#1e293b";
                for(let i=0; i<8; i++) {
                    const cloud = document.createElement('div');
                    cloud.className = 'cloud';
                    cloud.style.width = (Math.random() * 400 + 300) + 'px';
                    cloud.style.height = (Math.random() * 200 + 150) + 'px';
                    cloud.style.top = Math.random() * 80 + 'vh';
                    cloud.style.animationDuration = (Math.random() * 15 + 15) + 's';
                    cloud.style.left = "-400px";
                    bg.appendChild(cloud);
                }
            } else if (status === "Stormy") {
                document.body.style.background = "#020617";
                lightning.style.animation = 'flash 5s infinite';
                // Add rain to storm
                for(let i=0; i<200; i++) {
                    const drop = document.createElement('div');
                    drop.className = 'rain-drop';
                    drop.style.left = Math.random() * 100 + 'vw';
                    drop.style.animationDuration = '0.3s';
                    bg.appendChild(drop);
                }
            } else {
                document.body.style.background = "#0f172a";
                const sun = document.createElement('div');
                sun.className = 'sun-aura';
                bg.appendChild(sun);
            }
        }

        init();
    </script>
</body>
</html>
